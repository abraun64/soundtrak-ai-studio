<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — Marketing AI System</title>
  <style>{{ styles }}</style>
</head>
<body class="template-{{ template_name }}">
  <header class="page-header">
    <div class="page-header__inner">
      <nav class="breadcrumb" aria-label="Breadcrumb">{{ breadcrumb }}</nav>
      <div class="page-header__right">
        {{ library_nav }}
        <button type="button" class="refresh-btn" onclick="location.reload()" title="Refresh this page" aria-label="Refresh">&#10227;</button>
      </div>
    </div>
  </header>

  <main class="page-main">
    <article class="content">
      {{ body }}
    </article>
  </main>

  <footer class="page-footer">
    <span><strong>Soundtrak AI Studio</strong> · © 2026 Soundtrak Consulting · <a href="{{ site_root }}docs/legal/LICENSE.html">Licence</a> · <a href="{{ site_root }}docs/legal/NOTICE.html">Notice</a></span>
    <span>Source file: <code>{{ source_path }}</code></span>
  </footer>
</body>
</html>
